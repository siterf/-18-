            "Самурай с катаной", "Гладиатор на арене", "Раб и госпожа", "Доминатрикс без хлыста", 
            "Сабмиссив с характером", "Свингер на вечеринке", "Нудист в галстуке", 
            "Эксгибиционист в метро", "Вуайерист в замочной скважине", "Человек-загадка", 
            "Искуситель с шоколадом", "Искусительница с клубникой", "Донжуан с блокнотом", 
            "Клеопатра на троне", "Казанова в инвалидном кресле", "Ромео под балконом", 
            "Джульетта на балконе", "Отелло с платком", "Кармен с веером", "Лолита в саду", 
            "Гумберт с очками", "Секс-инструктор", "Тренер по флирту", "Гуру пикапа", 
            "Сваха с картотекой", "Брачный аферист", "Любовный детектив", "Частный сыщик в отеле", 
            "Горничная в номере", "Коридорный с ключом", "Портной с сантиметром", "Сапожник с туфелькой", 
            "Ювелир с кольцом", "Флорист с розой", "Кондитер со сливками", "Винодел с бокалом", 
            "Дегустатор с закрытыми глазами", "Парфюмер с флаконом", "Художник с обнажённой натурой", 
            "Скульптор с глиной", "Поэт с рифмой", "Писатель эротических романов", 
            "Читатель под одеялом", "Зритель в первом ряду", "Критик с лорнетом", 
            "Режиссёр интимных сцен", "Актёр без слов", "Актриса на кастинге", 
            "Каскадёр без страховки", "Дуэлянт с перчаткой", "Соперник в любовном треугольнике", 
            "Третий лишний", "Свидетель в шкафу", "Друг семьи", "Подруга невесты", 
            "Шафер на свадьбе", "Молодожён в номере", "Медовый месяц втроём", "Любовник в коме", 
            "Бывший на пороге", "Нынешний в ярости", "Будущий в мечтах", "Виртуальный партнёр", 
            "Гость из чата", "Звёздный ловелас", "Секс-символ 90-х", "Икона стиля", 
            "Королева вечеринки", "Принц на белом коне", "Принцесса на горошине", 
            "Спящая красавица", "Охотник за поцелуями", "Коллекционер сердец", "Разбиватель иллюзий", 
            "Строитель воздушных замков", "Житель пентхауса", "Бомж с букетом", "Игрок в «Крокодила» 18+"
        ];

        let activeWords = [...DEFAULT_WORDS];
        let gameWordsQueue = [];
        let isWordHidden = true;
        let totalWordsSeen = 0;

        // --- Custom Elegant Particle Physics ---
        const triggerRedConfetti = (startX, startY) => {
            const canvas = document.getElementById('particles-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const actualX = (typeof startX === 'number' && !isNaN(startX)) ? startX : window.innerWidth / 2;
            const actualY = (typeof startY === 'number' && !isNaN(startY)) ? startY : window.innerHeight / 2;
            
            const particles = [];
            // Clean palette of crimson hues, stark whites and charcoal gray
            const colors = ['#FF2B3C', '#E30B22', '#FFFFFF', '#1E1E22', '#55020B'];
            
            for (let i = 0; i < 45; i++) {
                particles.push({
                    x: actualX,
                    y: actualY,
                    vx: (Math.random() - 0.5) * 16,
                    vy: (Math.random() - 0.85) * 15 - 4,
                    size: Math.random() * 3.5 + 1.5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    decay: Math.random() * 0.016 + 0.014,
                    gravity: 0.28,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.25
                });
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                
                particles.forEach(p => {
                    if (p.alpha > 0) {
                        alive = true;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += p.gravity;
                        p.alpha -= p.decay;
                        p.rotation += p.rotSpeed;
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation);
                        ctx.globalAlpha = p.alpha;
                        ctx.fillStyle = p.color;
                        
                        ctx.beginPath();
                        // Draw square flakes or micro-circles alternatively
                        if (p.size > 2.5) {
                            ctx.rect(-p.size, -p.size, p.size * 2, p.size * 2);
                        } else {
                            ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                        }
                        ctx.fill();
                        ctx.restore();
                    }
                });
                
                if (alive) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };
            
            animate();
        };

        // --- Custom TXT words parser ---
        const parseWordsTxt = (text) => {
            return text.split('\n')
                .map(l => l.trim())
                .filter(l => l.length > 0 && !lineStartsWithComment(l));
        };

        const lineStartsWithComment = (line) => {
            return line.startsWith('#') || line.startsWith('//');
        };

        // --- Game Setup & State ---
        const shuffle = (array) => {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const loadWords = () => {
            const saved = localStorage.getItem('gesto_simplified_custom_words');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        activeWords = Array.from(new Set(parsed));
                        document.getElementById('btn-clear-words').classList.remove('hidden');
                        document.getElementById('upload-status').classList.remove('hidden');
                        document.getElementById('upload-status-text').innerText = `База: ${parsed.length} слов`;
                        return;
                    }
                } catch (e) {
                    console.error("Failed to load local words", e);
                }
            }
            activeWords = Array.from(new Set(DEFAULT_WORDS));
            document.getElementById('btn-clear-words').classList.add('hidden');
            document.getElementById('upload-status').classList.add('hidden');
        };

        const initGameSession = () => {
            gameWordsQueue = shuffle(activeWords);
            totalWordsSeen = 1;
            isWordHidden = true; // Always start hidden
            updateUIWord();
        };

        const updateUIWord = () => {
            if (gameWordsQueue.length === 0) {
                gameWordsQueue = shuffle(activeWords);
            }
            const word = gameWordsQueue[0];
            const wordTextEl = document.getElementById('word-text');
            const counterEl = document.getElementById('word-counter');
            const cardEl = document.getElementById('word-card');
            const glowEl = document.getElementById('card-glow');
            const dotEl = document.getElementById('card-dot-accent');
            const actionTitleEl = document.getElementById('card-action-title');
            
            counterEl.innerText = `Слово: ${totalWordsSeen}`;
            
            if (isWordHidden) {
                wordTextEl.innerText = "•••••••••";
                wordTextEl.classList.add('text-crimson-500/25', 'tracking-widest');
                wordTextEl.classList.remove('text-white');
                dotEl.classList.add('opacity-10');
                actionTitleEl.innerText = "СЛОВО СКРЫТО";
                actionTitleEl.classList.add('text-crimson-600');
                actionTitleEl.classList.remove('text-zinc-500');
                
                // Toggle card style to non-accent, heavy glass
                cardEl.className = "relative z-10 w-full aspect-[4/5] flex flex-col items-center justify-between premium-glass-card rounded-[36px] p-8 card-reset-active";
                glowEl.className = "absolute w-56 h-56 bg-black rounded-full filter blur-[60px] pointer-events-none transition-all duration-300";
                
                document.getElementById('hide-icon').innerText = 'visibility_off';
                document.getElementById('hide-text').innerText = 'Показать';
                document.getElementById('btn-hide').classList.add('active');
            } else {
                wordTextEl.innerText = word;
                wordTextEl.classList.remove('text-crimson-500/25', 'tracking-widest');
                wordTextEl.classList.add('text-white');
                dotEl.classList.remove('opacity-10');
                actionTitleEl.innerText = "ОБЪЯСНИТЕ ЖЕСТАМИ";
                actionTitleEl.classList.remove('text-crimson-600');
                actionTitleEl.classList.add('text-zinc-500');
                
                // Toggle card style to active crimson subtle glow
                cardEl.className = "relative z-10 w-full aspect-[4/5] flex flex-col items-center justify-between premium-glass-card-accent rounded-[36px] p-8 card-reset-active";
                glowEl.className = "absolute w-56 h-56 bg-crimson-500/10 rounded-full filter blur-[60px] pointer-events-none transition-all duration-300";
                
                document.getElementById('hide-icon').innerText = 'visibility';
                document.getElementById('hide-text').innerText = 'Скрыть';
                document.getElementById('btn-hide').classList.remove('active');
            }
        };

        const triggerCardAnimation = (animClass) => {
            const card = document.getElementById('word-card');
            
            // Apply swipe class
            const baseClass = isWordHidden ? 'premium-glass-card' : 'premium-glass-card-accent';
            card.className = `relative z-10 w-full aspect-[4/5] flex flex-col items-center justify-between ${baseClass} rounded-[36px] p-8 ${animClass}`;
            
            setTimeout(() => {
                // Shift the queue so we don't repeat words in a single session
                gameWordsQueue.shift();
                if (gameWordsQueue.length === 0) {
                    gameWordsQueue = shuffle(activeWords);
                }
                
                totalWordsSeen++;
                isWordHidden = true; // Always start next word as hidden!
                updateUIWord();
                
                // Reset card coordinates instantly
                card.className = `relative z-10 w-full aspect-[4/5] flex flex-col items-center justify-between premium-glass-card rounded-[36px] p-8 card-reset`;
                
                // Trigger entry transitions
                setTimeout(() => {
                    card.className = `relative z-10 w-full aspect-[4/5] flex flex-col items-center justify-between premium-glass-card rounded-[36px] p-8 card-reset-active`;
                }, 40);
            }, 350);
        };

        // --- DOM Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            loadWords();

            // Logo badge clicks trigger beautiful local sparks
            document.getElementById('logo-badge').addEventListener('click', (e) => {
                triggerRedConfetti(e.clientX, e.clientY);
            });

            // Start Game transition
            document.getElementById('btn-start').addEventListener('click', (e) => {
                triggerRedConfetti(e.clientX, e.clientY);
                initGameSession();
                document.getElementById('screen-splash').classList.add('hidden');
                document.getElementById('screen-game').classList.remove('hidden');
            });

            // Back to Menu screen transition
            document.getElementById('btn-back').addEventListener('click', () => {
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('screen-splash').classList.remove('hidden');
            });

            // Hide/Show text toggle
            document.getElementById('btn-hide').addEventListener('click', () => {
                isWordHidden = !isWordHidden;
                updateUIWord();
            });

            // Correct word action button click
            document.getElementById('btn-correct').addEventListener('click', (e) => {
                triggerRedConfetti(e.clientX, e.clientY);
                triggerCardAnimation('swipe-correct-anim');
            });

            // Skip word action button click
            document.getElementById('btn-skip').addEventListener('click', () => {
                triggerCardAnimation('swipe-skip-anim');
            });

            // Upload TXT logic
            const fileInput = document.getElementById('file-uploader');
            document.getElementById('btn-upload').addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const parsed = parseWordsTxt(content);
                    if (parsed.length > 0) {
                        localStorage.setItem('gesto_simplified_custom_words', JSON.stringify(parsed));
                        triggerRedConfetti(window.innerWidth / 2, window.innerHeight / 2);
                        loadWords();
                    } else {
                        alert("Файл пуст или содержит некорректные слова!");
                    }
                };
                reader.readAsText(file);
            });

            // Reset words base logic
            document.getElementById('btn-clear-words').addEventListener('click', () => {
                localStorage.removeItem('gesto_simplified_custom_words');
                loadWords();
            });
        });
    </script>
</body>
</html>
